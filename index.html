<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Data Explorer</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root { color-scheme: light; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      margin: 12px 0;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    label {
      font-size: 12px;
      color: #444;
      display: block;
      margin-bottom: 6px;
    }

    select, input, button {
      font: inherit;
    }

    select, input[type="number"], input[type="text"] {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      padding: 10px 12px;
      border: 1px solid #222;
      border-radius: 10px;
      background: #111;
      color: #fff;
      cursor: pointer;
    }

    button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .muted {
      color: #666;
      font-size: 12px;
    }

    .danger {
      color: #b00020;
    }

    .ok {
      color: #0a7a28;
    }

    .progress {
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid #ddd;
      border-radius: 999px;
      font-size: 12px;
      background: #fafafa;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 900px) {
      .grid2 { grid-template-columns: 1fr; }
    }

    .yearsBox {
      max-height: 180px;
      overflow: auto;
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 8px;
    }

    .yearsBox label {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 0;
      padding: 6px 4px;
      border-radius: 8px;
    }

    .yearsBox label:hover {
      background: #f7f7f7;
    }

    .stickyTop {
      position: sticky;
      top: 0;
      background: white;
      padding-top: 8px;
      z-index: 2;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    /* Keep exact Excel formatting in dropdown */
    #columns option {
      white-space: pre-wrap;
    }

    /* IMPORTANT FIX:
       let the table grow naturally and scroll horizontally,
       instead of shrinking every column */
    .tableWrap {
      max-height: 65vh;
      overflow: auto;
      border: 1px solid #eee;
      border-radius: 10px;
      margin-top: 10px;
    }

    #table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
      table-layout: auto;
    }

    #table th,
    #table td {
      border: 1px solid #ddd;
      padding: 6px 8px;
      font-size: 12px;
      vertical-align: top;
      white-space: pre;
      word-break: normal;
      overflow-wrap: normal;
      min-width: 120px;
    }

    #table th {
      position: sticky;
      top: 0;
      background: #fafafa;
      z-index: 1;
    }
  </style>
</head>

<body>
  <h1>Data Explorer</h1>

  <div class="card">
    <div class="row" style="justify-content:space-between; align-items:center;">
      <div class="muted">
        Source:
        <span class="pill mono" id="repoPill">mhrd-a / cvc @ main</span>
      </div>
      <div>
        <button id="runBtn" type="button">Load & Query</button>
      </div>
    </div>

    <div style="height:12px;"></div>

    <div class="grid2">
      <div>
        <label>Years</label>
        <div class="yearsBox" id="yearsBox"></div>
        <div class="row" style="margin-top:8px;">
          <button id="selectAllYears" type="button">Select all</button>
          <button id="clearYears" type="button" style="background:#fff;color:#111;border:1px solid #ccc;">Clear</button>
        </div>
      </div>

      <div>
        <label>Columns (exactly as in attached Excel header list)</label>
        <select id="columns" multiple size="10" style="width:100%; min-height:220px;"></select>
        <div class="row" style="margin-top:8px;">
          <button id="selectAllCols" type="button">Select all</button>
          <button id="clearCols" type="button" style="background:#fff;color:#111;border:1px solid #ccc;">Clear</button>
        </div>
        <div class="muted" style="margin-top:6px;">Tip: Ctrl/Cmd for multi-select.</div>
      </div>
    </div>

    <div style="height:12px;"></div>

    <div class="row">
      <div>
        <label>Rows per page</label>
        <select id="pageSize">
          <option>25</option>
          <option selected>50</option>
          <option>100</option>
          <option>250</option>
          <option>500</option>
        </select>
      </div>

      <div>
        <label>Max files per year (safety)</label>
        <input id="maxFilesPerYear" type="number" value="12" min="1" max="24" />
      </div>
    </div>
  </div>

  <div class="card">
    <div class="stickyTop">
      <div class="controls">
        <span class="pill" id="statusPill">Idle</span>
        <span class="pill" id="countPill">Rows: 0</span>
        <span class="pill" id="filesPill">Files: 0</span>
        <button id="prevBtn" type="button" disabled style="background:#fff;color:#111;border:1px solid #ccc;">Prev</button>
        <button id="nextBtn" type="button" disabled style="background:#fff;color:#111;border:1px solid #ccc;">Next</button>
        <span class="muted" id="pageInfo">Page 0 / 0</span>
        <button id="downloadBtn" type="button" disabled style="background:#0b6;color:#fff;border:1px solid #0b6;">Download CSV</button>
      </div>
      <div id="errorBox" class="muted danger" style="margin-top:8px;"></div>
      <div id="warnBox" class="muted" style="margin-top:6px;"></div>
    </div>

    <div class="progress" id="progress"></div>

    <div class="tableWrap">
      <table id="table">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

function setStatus(text, kind = "muted") {
  const pill = el("statusPill");
  pill.textContent = text;
  pill.className = "pill " + (kind === "danger" ? "danger" : kind === "ok" ? "ok" : "");

function initYears() {
  const box = el("yearsBox");
  box.innerHTML = "";
  for (const y of YEARS) {
    const line = document.createElement("label");
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.value = y;
    line.appendChild(cb);

    const span = document.createElement("span");
    span.textContent = y;
    line.appendChild(span);

    box.appendChild(line);
  }
}

function setColumnsFromExcelHeaders(headers) {
  const clean = headers
    .map(h => String(h ?? ""))
    .filter(h => h.length > 0);

  EXCEL_HEADERS = clean;
  PRETTY_TO_EXACT = new Map();

  const sel = el("columns");
  sel.innerHTML = "";

  for (const header of clean) {
    PRETTY_TO_EXACT.set(header, header);
    const opt = document.createElement("option");
    opt.value = header;
    opt.textContent = header;
    sel.appendChild(opt);
  }

  const available = new Set(clean);
  const missing = [];

  for (const opt of Array.from(sel.options)) {
    if (DEFAULT_COLUMNS_REQUESTED.includes(opt.value)) {
      opt.selected = true;
    }
  }

  for (const c of DEFAULT_COLUMNS_REQUESTED) {
    if (!available.has(c)) missing.push(c);
  }

  if (missing.length) {
    setWarn(
      "These requested default columns were not found exactly and were skipped:\n" +
      missing.join(" | ")
    );
  } else {
    setWarn("");
  }
}

function getSelectedYears() {
  return Array.from(el("yearsBox").querySelectorAll("input[type=checkbox]:checked")).map(x => x.value);
}

function getSelectedPrettyColumns() {
  return Array.from(el("columns").selectedOptions).map(o => o.value);
}

function buildYearPath(year) {
  return DATA_BASE_PATH ? `${DATA_BASE_PATH}/${year}` : `${year}`;
}

async function githubListYearFiles(year) {
  const yearPath = buildYearPath(year);

  const url =
    `https://api.github.com/repos/${encodeURIComponent(GITHUB_OWNER)}/${encodeURIComponent(GITHUB_REPO)}` +
    `/contents/${yearPath.split("/").map(encodeURIComponent).join("/")}?ref=${encodeURIComponent(GITHUB_BRANCH)}`;

  const res = await fetch(url, {
    headers: { "Accept": "application/vnd.github+json" }
  });

  if (res.status === 404) {
    return { files: [], missingFolder: true, yearPath };
  }

  if (!res.ok) {
    const txt = await res.text().catch(() => "");
    throw new Error(`GitHub API error for year ${year}: ${res.status} ${txt}`);
  }

  const items = await res.json();

  if (!Array.isArray(items)) {
    return { files: [], missingFolder: false, yearPath };
  }

  const files = items
    .filter(it => it && it.type === "file" && typeof it.name === "string" && it.name.toLowerCase().endsWith(".xlsx"))
    .map(it => ({ name: it.name, download_url: it.download_url, path: it.path }))
    .sort((a, b) => a.name.localeCompare(b.name));

  return { files, missingFolder: false, yearPath };
}

async function fetchWorkbookFirstSheet(downloadUrl) {
  const res = await fetch(downloadUrl);
  if (!res.ok) throw new Error(`Failed to fetch ${downloadUrl}: ${res.status} ${res.statusText}`);

  const ab = await res.arrayBuffer();
  const wb = XLSX.read(ab, { type: "array" });
  const sheetName = wb.SheetNames[0];
  if (!sheetName) return { rows: [] };

  const ws = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });

  return { rows: Array.isArray(rows) ? rows : [] };
}

function escapeHtml(s) {
  return String(s)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function renderTable() {
  const colsPretty = getSelectedPrettyColumns();
  const pageSize = parseInt(el("pageSize").value, 10) || 50;
  const total = VIEW_ROWS.length;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  CURRENT_PAGE = Math.min(Math.max(1, CURRENT_PAGE), totalPages);

  const start = (CURRENT_PAGE - 1) * pageSize;
  const end = Math.min(start + pageSize, total);
  const pageRows = VIEW_ROWS.slice(start, end);

  const thead = el("thead");
  thead.innerHTML = "";
  const trh = document.createElement("tr");

  for (const c of colsPretty) {
    const th = document.createElement("th");
    th.innerHTML = escapeHtml(c);
    trh.appendChild(th);
  }
  thead.appendChild(trh);

  const tbody = el("tbody");
  tbody.innerHTML = "";

  for (const r of pageRows) {
    const tr = document.createElement("tr");
    for (const c of colsPretty) {
      const td = document.createElement("td");
      td.innerHTML = escapeHtml(r?.[c] ?? "");
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }

  el("pageInfo").textContent =
    `Page ${CURRENT_PAGE} / ${totalPages} (showing ${total === 0 ? 0 : start + 1}-${end} of ${total})`;

  el("prevBtn").disabled = (CURRENT_PAGE <= 1);
  el("nextBtn").disabled = (CURRENT_PAGE >= totalPages);
  el("downloadBtn").disabled = (total === 0 || colsPretty.length === 0);
  el("countPill").textContent = `Rows: ${total.toLocaleString()}`;
}

function downloadCsv() {
  const colsPretty = getSelectedPrettyColumns();
  if (!colsPretty.length) return;

  const csvLines = [];
  csvLines.push(colsPretty.map(c => `"${String(c).replaceAll('"', '""')}"`).join(","));

  for (const r of VIEW_ROWS) {
    const line = colsPretty.map(c => `"${String(r?.[c] ?? "").replaceAll('"', '""')}"`).join(",");
    csvLines.push(line);
  }

  const blob = new Blob([csvLines.join("\n")], { type: "text/csv;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "query_results.csv";
  document.body.appendChild(a);
  a.click();
  a.remove();
}

async function runQuery() {
  setError("");
  clearProgress();
  setStatus("Working…");

  const years = getSelectedYears();
  const maxFilesPerYear = Math.max(1, Math.min(24, parseInt(el("maxFilesPerYear").value, 10) || 12));

  if (!years.length) {
    setStatus("Idle");
    setError("Please select at least one year.");
    return;
  }

  const selectedPretty = getSelectedPrettyColumns();
  if (!selectedPretty.length) {
    setStatus("Idle");
    setError("Select at least one column.");
    return;
  }

  ALL_ROWS = [];
  VIEW_ROWS = [];
  CURRENT_PAGE = 1;
  el("filesPill").textContent = "Files: 0";
  el("countPill").textContent = "Rows: 0";

  let fileCount = 0;
  const skippedYears = [];

  try {
    for (const y of years) {
      logProgress(`Listing files for year ${y}…`);
      const result = await githubListYearFiles(y);

      if (result.missingFolder) {
        logProgress(`  Year ${y} folder not found at /${result.yearPath} - skipped`);
        skippedYears.push(y);
        continue;
      }

      const files = result.files;

      if (!files.length) {
        logProgress(`  No .xlsx files found in /${result.yearPath}`);
        continue;
      }

      const picked = files.slice(0, maxFilesPerYear);
      logProgress(`  Found ${files.length} .xlsx files, loading ${picked.length}…`);

      for (const f of picked) {
        fileCount += 1;
        el("filesPill").textContent = `Files: ${fileCount.toLocaleString()}`;
        logProgress(`    Loading ${f.name}…`);

        const { rows } = await fetchWorkbookFirstSheet(f.download_url);

        for (const row of rows) {
          const out = {};
          for (const exactHeader of selectedPretty) {
            const exact = PRETTY_TO_EXACT.get(exactHeader);
            out[exactHeader] = exact ? (row?.[exact] ?? "") : "";
          }
          ALL_ROWS.push(out);
        }

        logProgress(`      +${rows.length} rows`);
        el("countPill").textContent = `Rows: ${ALL_ROWS.length.toLocaleString()}`;
      }

      logProgress("");
    }

    VIEW_ROWS = ALL_ROWS;
    renderTable();

    if (skippedYears.length > 0) {
      setWarn(`Skipped year folders not found in repo: ${skippedYears.join(", ")}`);
    } else {
      setWarn("");
    }

    if (ALL_ROWS.length === 0) {
      setStatus("Done");
      setError(`No rows were loaded. Check your repo path. Current path pattern is /${DATA_BASE_PATH}/<year>`);
    } else {
      setStatus("Done", "ok");
    }

  } catch (err) {
    console.error(err);
    setStatus("Error", "danger");
    setError(String(err?.message || err));
    VIEW_ROWS = [];
    renderTable();
  }
}

el("runBtn").addEventListener("click", runQuery);
el("prevBtn").addEventListener("click", () => { CURRENT_PAGE -= 1; renderTable(); });
el("nextBtn").addEventListener("click", () => { CURRENT_PAGE += 1; renderTable(); });
el("pageSize").addEventListener("change", () => { CURRENT_PAGE = 1; renderTable(); });
el("columns").addEventListener("change", () => { CURRENT_PAGE = 1; renderTable(); });
el("downloadBtn").addEventListener("click", downloadCsv);

el("selectAllYears").addEventListener("click", () => {
  el("yearsBox").querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = true);
});

el("clearYears").addEventListener("click", () => {
  el("yearsBox").querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = false);
});

el("selectAllCols").addEventListener("click", () => {
  Array.from(el("columns").options).forEach(o => o.selected = true);
  CURRENT_PAGE = 1;
  renderTable();
});

el("clearCols").addEventListener("click", () => {
  Array.from(el("columns").options).forEach(o => o.selected = false);
  CURRENT_PAGE = 1;
  renderTable();
});

(function init() {
  el("repoPill").textContent = `${GITHUB_OWNER} / ${GITHUB_REPO} @ ${GITHUB_BRANCH}`;
  initYears();
  setColumnsFromExcelHeaders(PRESET_EXCEL_HEADERS);
  renderTable();
})();
</script>
