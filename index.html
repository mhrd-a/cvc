<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Data Explorer</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root { color-scheme: light; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 16px; }
    h1 { margin: 0 0 12px; font-size: 20px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin: 12px 0; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    label { font-size: 12px; color: #444; display: block; margin-bottom: 6px; }
    select, input, button { font: inherit; }
    select, input[type="number"], input[type="text"] { padding: 8px; border: 1px solid #ccc; border-radius: 8px; }
    button { padding: 10px 12px; border: 1px solid #222; border-radius: 10px; background: #111; color: #fff; cursor: pointer; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .muted { color: #666; font-size: 12px; }
    .danger { color: #b00020; }
    .ok { color: #0a7a28; }
    .progress { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 6px 8px; font-size: 12px; vertical-align: top; }
    th { position: sticky; top: 0; background: #fafafa; z-index: 1; }
    .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .pill { display:inline-block; padding: 2px 8px; border:1px solid #ddd; border-radius: 999px; font-size: 12px; background:#fafafa; }
    .grid2 { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } }
    .yearsBox { max-height: 180px; overflow: auto; border: 1px solid #eee; border-radius: 10px; padding: 8px; }
    .yearsBox label { display:flex; gap:8px; align-items:center; margin: 0; padding: 6px 4px; border-radius: 8px; }
    .yearsBox label:hover { background: #f7f7f7; }
    .stickyTop { position: sticky; top: 0; background: white; padding-top: 8px; z-index: 2; }
  </style>
</head>

<body>
  <h1>Data Explorer</h1>

  <div class="card">
    <div class="grid2">
      <div>
        <label>Owner</label>
        <input id="owner" value="mhrd-a" type="text" style="width: 220px;">
      </div>
      <div>
        <label>Repository</label>
        <input id="repo" value="cvc" type="text" style="width: 260px;">
      </div>
    </div>

    <div style="height:12px;"></div>

    <div class="row">
      <div>
        <label>Branch</label>
        <input id="branch" value="main" type="text" style="width: 220px;">
      </div>

      <div style="flex:1"></div>

      <div>
        <button id="runBtn" type="button">Load & Query</button>
      </div>
    </div>

    <div style="height:12px;"></div>

    <div class="grid2">
      <div>
        <label>Years</label>
        <div class="yearsBox" id="yearsBox"></div>
        <div class="row" style="margin-top:8px;">
          <button id="selectAllYears" type="button">Select all</button>
          <button id="clearYears" type="button" style="background:#fff;color:#111;border:1px solid #ccc;">Clear</button>
        </div>
      </div>

      <div>
        <label>Columns (loaded from Excel header row)</label>
        <select id="columns" multiple size="10" style="width: 100%; min-height: 180px;"></select>
        <div class="row" style="margin-top:8px;">
          <button id="selectAllCols" type="button">Select all</button>
          <button id="clearCols" type="button" style="background:#fff;color:#111;border:1px solid #ccc;">Clear</button>
        </div>
        <div class="muted" style="margin-top:6px;">
          Tip: Ctrl/Cmd for multi-select.
        </div>
      </div>
    </div>

    <div style="height:12px;"></div>

    <div class="row">
      <div>
        <label>Rows per page</label>
        <select id="pageSize">
          <option>25</option>
          <option selected>50</option>
          <option>100</option>
          <option>250</option>
          <option>500</option>
        </select>
      </div>

      <div>
        <label>Max files per year (safety)</label>
        <input id="maxFilesPerYear" type="number" value="12" min="1" max="24" />
      </div>
    </div>

    <div class="muted" style="margin-top:10px;">
      First file loaded will be used to detect the exact column headers (including line breaks).
    </div>
  </div>

  <div class="card">
    <div class="stickyTop">
      <div class="controls">
        <span class="pill" id="statusPill">Idle</span>
        <span class="pill" id="countPill">Rows: 0</span>
        <span class="pill" id="filesPill">Files: 0</span>
        <button id="prevBtn" type="button" disabled style="background:#fff;color:#111;border:1px solid #ccc;">Prev</button>
        <button id="nextBtn" type="button" disabled style="background:#fff;color:#111;border:1px solid #ccc;">Next</button>
        <span class="muted" id="pageInfo">Page 0 / 0</span>
        <button id="downloadBtn" type="button" disabled style="background:#0b6;color:#fff;border:1px solid #0b6;">Download CSV</button>
      </div>
      <div id="errorBox" class="muted danger" style="margin-top:8px;"></div>
      <div id="warnBox" class="muted" style="margin-top:6px;"></div>
    </div>

    <div class="progress" id="progress"></div>

    <div style="max-height: 65vh; overflow:auto; border:1px solid #eee; border-radius:10px; margin-top:10px;">
      <table id="table">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

<script>
const YEARS = Array.from({length: 2026 - 2000 + 1}, (_, i) => String(2000 + i));
const el = (id) => document.getElementById(id);

let ALL_ROWS = [];
let VIEW_ROWS = [];
let CURRENT_PAGE = 1;

// The exact headers as they exist in the Excel file (may contain \n and quotes)
let EXCEL_HEADERS = null;
// Map from pretty label -> exact excel header
let PRETTY_TO_EXACT = new Map();

function setStatus(text, kind="muted") {
  const pill = el("statusPill");
  pill.textContent = text;
  pill.className = "pill " + (kind === "danger" ? "danger" : kind === "ok" ? "ok" : "");
}
function setError(msg="") { el("errorBox").textContent = msg; }
function setWarn(msg="") { el("warnBox").textContent = msg; }
function logProgress(msg) { el("progress").textContent += msg + "\n"; }
function clearProgress() { el("progress").textContent = ""; }

function normalizePrettyLabel(header) {
  // What you display to the user (no newlines, no wrapping quotes, collapse spaces)
  return String(header ?? "")
    .replace(/\r?\n/g, " ")
    .replace(/^\s*"+|"+\s*$/g, "") // remove leading/trailing quotes
    .replace(/\s+/g, " ")
    .trim();
}

function initYears() {
  const box = el("yearsBox");
  box.innerHTML = "";
  for (const y of YEARS) {
    const line = document.createElement("label");
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.value = y;
    line.appendChild(cb);
    const span = document.createElement("span");
    span.textContent = y;
    line.appendChild(span);
    box.appendChild(line);
  }
}

function setColumnsFromExcelHeaders(headers) {
  // Filter empty headers (you have at least one empty column after Round Number)
  const clean = headers
    .map(h => String(h ?? ""))
    .map(h => h.trim())
    .filter(h => h.length > 0);

  EXCEL_HEADERS = clean;
  PRETTY_TO_EXACT = new Map();
  const sel = el("columns");
  sel.innerHTML = "";

  for (const exact of clean) {
    const pretty = normalizePrettyLabel(exact);

    // If duplicates after prettifying, keep them unique by appending a counter
    let uniquePretty = pretty;
    let k = 2;
    while (PRETTY_TO_EXACT.has(uniquePretty)) {
      uniquePretty = `${pretty} [${k++}]`;
    }

    PRETTY_TO_EXACT.set(uniquePretty, exact);

    const opt = document.createElement("option");
    opt.value = uniquePretty;   // user selects pretty label
    opt.textContent = uniquePretty;
    sel.appendChild(opt);
  }

  // Auto-select a few common columns if present
  const auto = new Set([
    "Investee Company Name",
    "Investment Date",
    "Round Number",
    "Firm Investor Name"
  ]);

  for (const opt of Array.from(sel.options)) {
    if (auto.has(opt.value)) opt.selected = true;
  }
}

function getSelectedYears() {
  return Array.from(el("yearsBox").querySelectorAll("input[type=checkbox]:checked")).map(x => x.value);
}
function getSelectedPrettyColumns() {
  return Array.from(el("columns").selectedOptions).map(o => o.value);
}

async function githubListYearFiles(owner, repo, year, branch) {
  const url =
    `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}` +
    `/contents/data/${encodeURIComponent(year)}?ref=${encodeURIComponent(branch)}`;

  const res = await fetch(url, { headers: { "Accept": "application/vnd.github+json" } });
  if (!res.ok) {
    const txt = await res.text().catch(() => "");
    throw new Error(`GitHub API error for year ${year}: ${res.status} ${txt}`);
  }
  const items = await res.json();
  if (!Array.isArray(items)) return [];
  return items
    .filter(it => it && it.type === "file" && typeof it.name === "string" && it.name.toLowerCase().endsWith(".xlsx"))
    .map(it => ({ name: it.name, download_url: it.download_url, path: it.path }))
    .sort((a,b) => a.name.localeCompare(b.name));
}

async function fetchWorkbookFirstSheet(downloadUrl) {
  const res = await fetch(downloadUrl);
  if (!res.ok) throw new Error(`Failed to fetch ${downloadUrl}: ${res.status} ${res.statusText}`);
  const ab = await res.arrayBuffer();
  const wb = XLSX.read(ab, { type: "array" });
  const sheetName = wb.SheetNames[0];
  if (!sheetName) return { rows: [], headers: [] };
  const ws = wb.Sheets[sheetName];

  // Header row EXACT
  const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
  const headers = (Array.isArray(aoa) && Array.isArray(aoa[0])) ? aoa[0] : [];

  // Data rows as objects with exact headers
  const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });

  return { rows: Array.isArray(rows) ? rows : [], headers };
}

function escapeHtml(s) {
  return String(s)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function renderTable() {
  const colsPretty = getSelectedPrettyColumns();
  const pageSize = parseInt(el("pageSize").value, 10) || 50;
  const total = VIEW_ROWS.length;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  CURRENT_PAGE = Math.min(Math.max(1, CURRENT_PAGE), totalPages);

  const start = (CURRENT_PAGE - 1) * pageSize;
  const end = Math.min(start + pageSize, total);
  const pageRows = VIEW_ROWS.slice(start, end);

  const thead = el("thead");
  thead.innerHTML = "";
  const trh = document.createElement("tr");
  for (const c of colsPretty) {
    const th = document.createElement("th");
    th.innerHTML = escapeHtml(c);
    trh.appendChild(th);
  }
  thead.appendChild(trh);

  const tbody = el("tbody");
  tbody.innerHTML = "";
  for (const r of pageRows) {
    const tr = document.createElement("tr");
    for (const c of colsPretty) {
      const td = document.createElement("td");
      td.innerHTML = escapeHtml(r?.[c] ?? "");
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }

  el("pageInfo").textContent = `Page ${CURRENT_PAGE} / ${totalPages} (showing ${start+1}-${end} of ${total})`;
  el("prevBtn").disabled = (CURRENT_PAGE <= 1);
  el("nextBtn").disabled = (CURRENT_PAGE >= totalPages);
  el("downloadBtn").disabled = (total === 0 || colsPretty.length === 0);

  el("countPill").textContent = `Rows: ${total.toLocaleString()}`;
}

function downloadCsv() {
  const colsPretty = getSelectedPrettyColumns();
  if (!colsPretty.length) return;

  const rows = VIEW_ROWS;
  const csvLines = [];
  csvLines.push(colsPretty.map(c => `"${String(c).replaceAll('"','""')}"`).join(","));
  for (const r of rows) {
    const line = colsPretty.map(c => `"${String(r?.[c] ?? "").replaceAll('"','""')}"`).join(",");
    csvLines.push(line);
  }
  const blob = new Blob([csvLines.join("\n")], { type: "text/csv;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "query_results.csv";
  document.body.appendChild(a);
  a.click();
  a.remove();
}

async function runQuery() {
  setError("");
  setWarn("");
  clearProgress();
  setStatus("Working…");

  const owner = el("owner").value.trim();
  const repo = el("repo").value.trim();
  const branch = el("branch").value.trim() || "main";
  const years = getSelectedYears();
  const maxFilesPerYear = Math.max(1, Math.min(24, parseInt(el("maxFilesPerYear").value, 10) || 12));

  if (!owner || !repo) { setStatus("Idle"); setError("Please fill in owner and repository."); return; }
  if (!years.length) { setStatus("Idle"); setError("Please select at least one year."); return; }

  ALL_ROWS = [];
  VIEW_ROWS = [];
  CURRENT_PAGE = 1;

  el("filesPill").textContent = "Files: 0";
  el("countPill").textContent = "Rows: 0";

  let fileCount = 0;

  try {
    for (const y of years) {
      logProgress(`Listing files for year ${y}…`);
      const files = await githubListYearFiles(owner, repo, y, branch);

      if (!files.length) {
        logProgress(`  (No .xlsx files found in /data/${y}/)`);
        continue;
      }

      const picked = files.slice(0, maxFilesPerYear);
      logProgress(`  Found ${files.length} .xlsx files, loading ${picked.length}…`);

      for (const f of picked) {
        fileCount += 1;
        el("filesPill").textContent = `Files: ${fileCount.toLocaleString()}`;
        logProgress(`    Loading ${f.name}…`);

        const { rows, headers } = await fetchWorkbookFirstSheet(f.download_url);

        // First loaded file: detect columns and populate dropdown EXACTLY
        if (!EXCEL_HEADERS) {
          setColumnsFromExcelHeaders(headers);
          logProgress(`      Detected ${EXCEL_HEADERS.length} non-empty columns (dropdown updated).`);
          logProgress(`      Now select columns and click Load & Query again if you want different columns.`);
        }

        const selectedPretty = getSelectedPrettyColumns();
        if (!selectedPretty.length) {
          setStatus("Idle");
          setError("Select at least one column (dropdown is based on your Excel headers).");
          return;
        }

        // Extract using exact headers, but store with pretty labels as keys (for table)
        for (const row of rows) {
          const out = {};
          for (const pretty of selectedPretty) {
            const exact = PRETTY_TO_EXACT.get(pretty);
            out[pretty] = exact ? (row?.[exact] ?? "") : "";
          }
          ALL_ROWS.push(out);
        }

        logProgress(`      +${rows.length} rows`);
        el("countPill").textContent = `Rows: ${ALL_ROWS.length.toLocaleString()}`;
      }
      logProgress("");
    }

    VIEW_ROWS = ALL_ROWS;
    setStatus("Done", "ok");
    renderTable();

    if (ALL_ROWS.length === 0) {
      setError("No rows were loaded. Check your repo path and that files exist.");
    }
  } catch (err) {
    console.error(err);
    setStatus("Error", "danger");
    setError(String(err?.message || err));
    VIEW_ROWS = [];
    renderTable();
  }
}

// Events
el("runBtn").addEventListener("click", runQuery);
el("prevBtn").addEventListener("click", () => { CURRENT_PAGE -= 1; renderTable(); });
el("nextBtn").addEventListener("click", () => { CURRENT_PAGE += 1; renderTable(); });
el("pageSize").addEventListener("change", () => { CURRENT_PAGE = 1; renderTable(); });
el("columns").addEventListener("change", () => { CURRENT_PAGE = 1; renderTable(); });
el("downloadBtn").addEventListener("click", downloadCsv);

el("selectAllYears").addEventListener("click", () => {
  el("yearsBox").querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = true);
});
el("clearYears").addEventListener("click", () => {
  el("yearsBox").querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = false);
});

el("selectAllCols").addEventListener("click", () => {
  const sel = el("columns");
  Array.from(sel.options).forEach(o => o.selected = true);
  CURRENT_PAGE = 1;
  renderTable();
});
el("clearCols").addEventListener("click", () => {
  const sel = el("columns");
  Array.from(sel.options).forEach(o => o.selected = false);
  CURRENT_PAGE = 1;
  renderTable();
});

// Init
(function init() {
  initYears();
  // placeholder until first file is loaded
  const sel = el("columns");
  sel.innerHTML = "";
  const opt = document.createElement("option");
  opt.value = "";
  opt.textContent = "(Click Load & Query once to detect Excel headers)";
  sel.appendChild(opt);
  renderTable();
})();
</script>

</body>
</html>
